appId: com.mywhiteboard.app
productName: My Whiteboard
# Workspace hoisting keeps electron in the root node_modules where builder's
# range resolution can't see it — pin the version explicitly.
electronVersion: 43.1.1
directories:
  output: release
  buildResources: build
files:
  - out/**
  - package.json
# .mywb documents open in the app from Finder.
fileAssociations:
  - ext: mywb
    name: My Whiteboard Document
    role: Editor
mac:
  target:
    - target: dmg
      arch: universal
  category: public.app-category.productivity
  # Unsigned for internal builds; users right-click → Open on first launch.
  identity: null
dmg:
  title: My Whiteboard
linux:
  # AppImage runs on any distro; deb for Debian/Ubuntu. Both unsigned —
  # Linux has no notarization step, so this needs no account or certificate.
  target:
    - AppImage
    - deb
  category: Development
