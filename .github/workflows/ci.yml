# Two tiers: `fast` gives every push a typecheck + unit signal in minutes,
# `e2e` runs the real Electron / browser / VS Code suites behind it. Splitting
# them keeps an environment hiccup in the heavy job from hiding the cheap
# signal. Every step calls an existing root script, so the scripts stay the
# single source of truth for how the project is built and tested.

name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  # Packages the desktop app for Linux (AppImage + deb). Runs alongside e2e,
  # not after it — a build failure and a test failure are independent signals.
  linux-build:
    needs: [fast]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Build Linux packages
        run: npm run build:linux -w apps/desktop
      - name: Upload Linux packages
        uses: actions/upload-artifact@v4
        with:
          name: linux-desktop
          path: |
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.deb
          if-no-files-found: error
          retention-days: 14

  e2e:
    needs: [fast]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci

      # Electron and VS Code both need a display on Linux.
      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      # ~270MB of VS Code per run without this.
      - name: Cache VS Code test install
        uses: actions/cache@v4
        with:
          path: apps/vscode/.vscode-test
          key: vscode-test-${{ runner.os }}

      - name: Desktop e2e (Electron)
        run: xvfb-run -a npm run e2e

      # Each suite reports even when an earlier one failed — one red suite
      # should not hide the state of the others.
      - name: Web e2e
        if: always()
        run: npm run e2e:web

      - name: Relay e2e
        if: always()
        run: npm run e2e:relay

      - name: VS Code extension e2e
        if: always()
        run: xvfb-run -a npm run e2e:vscode

      - name: Upload Playwright reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-reports
          path: |
            apps/*/playwright-report/
            apps/*/test-results/
          if-no-files-found: ignore
          retention-days: 7
