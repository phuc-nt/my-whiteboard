# This repo eating its own dog food: docs/architecture.mywb describes this
# codebase, so every PR that touches the code re-checks the diagram against it.
#
# The export step always runs — it proves the board and the CLI are healthy
# even with no API key configured. The agent steps skip (not fail) when
# ANTHROPIC_API_KEY is absent or the PR comes from a fork, so contributors
# never see a red check they cannot fix. Add the secret to turn the analysis on.
#
# Template + agent instructions: examples/ci-drift-check/

name: diagram-drift-check

on:
  pull_request:
    paths:
      - 'packages/**'
      - 'apps/**'
      - 'services/**'
      - 'docs/architecture.mywb'
      - '.github/workflows/diagram-drift-check.yml'
  workflow_dispatch:

env:
  BOARD_PATH: docs/architecture.mywb

jobs:
  drift:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      # Full history so the agent's scoping step can diff against the base.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run build -w apps/cli

      - name: Export diagram as JSON
        run: node apps/cli/dist/cli.js file read "$BOARD_PATH" --json > diagram.json

      - name: Decide whether the agent can run
        id: agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ] && [ "${{ github.event.pull_request.head.repo.fork }}" != "true" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Drift agent skipped: no ANTHROPIC_API_KEY (or fork PR). Export succeeded."
          fi

      - name: Install Claude Code
        if: steps.agent.outputs.enabled == 'true'
        run: npm install -g @anthropic-ai/claude-code

      - name: Drift check (agent writes findings.json)
        if: steps.agent.outputs.enabled == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          claude -p "Follow examples/ci-drift-check/SKILL.md. diagram.json in \
            the repo root is the exported architecture board. BASE_REF is set \
            in the environment — apply the scoping step, evaluate the in-scope \
            claims against this repository, and write findings.json exactly \
            per the output contract. Do not post comments." \
            --allowedTools "Bash,Read,Grep,Glob,Write"

      - name: Validate findings.json
        if: steps.agent.outputs.enabled == 'true'
        run: |
          jq -e '
            .version == 1
            and (.claims | type == "array")
            and ([.claims[].status] - ["ok","drifted","unverifiable","skipped-out-of-scope"] == [])
            and ([.summary.ok, .summary.drifted, .summary.unverifiable, .summary.skipped]
                 | all(tostring | test("^[0-9]+$")))
            and (.summary.ok == ([.claims[] | select(.status == "ok")] | length))
            and (.summary.drifted == ([.claims[] | select(.status == "drifted")] | length))
            and (.summary.unverifiable == ([.claims[] | select(.status == "unverifiable")] | length))
            and (.summary.skipped == ([.claims[] | select(.status == "skipped-out-of-scope")] | length))
          ' findings.json

      - name: Comment on the PR (rendered from findings)
        if: steps.agent.outputs.enabled == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          DRIFTED=$(jq '.summary.drifted' findings.json)
          UNVERIFIABLE=$(jq '.summary.unverifiable' findings.json)
          if [ "$DRIFTED" -gt 0 ] || [ "$UNVERIFIABLE" -gt 0 ]; then
            {
              echo "## Diagram drift check"
              echo ""
              echo "| status | type | claim | evidence | note |"
              echo "|---|---|---|---|---|"
              jq -r '.claims[]
                | select(.status == "drifted" or .status == "unverifiable")
                | [.status, .type, .claim, (.evidence // [] | join("<br>")), (.note // "")]
                | map(tostring | gsub("\\|"; "\\|") | gsub("\n"; " "))
                | "| " + join(" | ") + " |"' \
                findings.json
            } > comment.md
          else
            TOTAL=$(jq '.claims | length' findings.json)
            SKIPPED=$(jq '.summary.skipped' findings.json)
            SCOPE=$(jq -r '.run.scope' findings.json)
            echo "Diagram drift check: in sync ($((TOTAL - SKIPPED))/$TOTAL claims evaluated, scope=$SCOPE)." > comment.md
          fi
          gh pr comment "$PR_NUMBER" --body-file comment.md

      - name: Upload findings artifact
        if: always() && steps.agent.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: drift-findings
          path: findings.json
          if-no-files-found: ignore
